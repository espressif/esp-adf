include:
  - '.gitlab/ci/common.yml'

example_test_esp32:
  extends:
    - .rules:build:enable-example-test-esp32
    - .pytest_example_template
  variables:
    IDF_TARGET: esp32
    BOARD: ESP_LYRAT_MINI_V1_1
  needs:
    - job: build_examples_esp32_lyrat_mini_v1_1
      optional: true
  tags: [ esp32, ADF_EXAMPLE_GENERIC ]

example_test_esp32s2:
  extends:
    - .rules:build:enable-example-test-esp32s2
    - .pytest_example_template
  variables:
    IDF_TARGET: esp32s2
    BOARD: ESP32_S2_KALUGA_1_V1_2
  needs:
    - job: build_examples_esp32s2_kaluga_v1_2
      optional: true
  tags: [ esp32s2, ADF_EXAMPLE_GENERIC ]

example_test_esp32s3:
  extends:
    - .rules:build:enable-example-test-esp32s3
    - .pytest_example_template
  variables:
    IDF_TARGET: esp32s3
    BOARD: ESP32_S3_KORVO2_V3
  needs:
    - job: build_examples_esp32s3_korvo_v2
      optional: true
  tags: [ esp32s3, ADF_EXAMPLE_GENERIC ]

example_test_esp32p4:
  extends:
    - .rules:build:enable-example-test-esp32p4
    - .pytest_example_template
  variables:
    IDF_TARGET: esp32p4
    BOARD: ESP32_P4_FUNCTION_EV
  needs:
    - job: build_examples_esp32p4_function_ev_board
      optional: true
  tags: [ esp32p4, ADF_EXAMPLE_GENERIC ]

.example_test_pytest_esp32_audio_loopback:
  image: "$ADF_DOCKER_REGISTRY/target_test_env_v5.3:2"
  extends:
    - .rules:build:example_test_audio_loopback
    - .pytest_example_template
  variables:
    IDF_TARGET: esp32
    BOARD: ESP_LYRAT_MINI_V1_1
  needs:
    - job: build_examples_esp32_lyrat_mini_v1_1
      optional: true
  tags: [ esp32, AUDIO_LOOPBACK_ENV ]
  script:
    - export PYTHONPATH="/usr/local/lib/python3.9/dist-packages:$PYTHONPATH"
    - arecord -l
    - pytest_apps example
