.patterns-build_components: &patterns-build_components
  - "CMakeLists.txt"
  - ".gitmodules"
  - "components/**/*"

.patterns-example_test: &patterns-example_test
  - "CMakeLists.txt"
  - ".gitmodules"
  - "components/**/*"
  - "examples/**/*"

##############
# if anchors #
##############
.if-web: &if-web
  if: '$CI_PIPELINE_SOURCE == "web"'

.if-ref-master: &if-ref-master
  if: '$CI_COMMIT_REF_NAME == "master"'

.if-trigger: &if-trigger
  if: '$CI_PIPELINE_SOURCE == "trigger"'

.if-schedule: &if-schedule
  if: '$CI_PIPELINE_SOURCE == "schedule"'

.if-pipeline: &if-pipeline
  if: '$CI_PIPELINE_SOURCE == "pipeline"'

.if-child-pipeline: &if-child-pipeline
  if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'

.if-merge_request_event: &if-merge_request_event
  if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.if-open-merge-request: &if-open-merge-request
  if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && ($CI_PIPELINE_SOURCE == "push")'

.if-dev-push: &if-dev-push
  if: '$CI_COMMIT_REF_NAME != "master" && $CI_COMMIT_BRANCH !~ /^release\/v/ && $CI_COMMIT_TAG !~ /^v\d+\.\d+(\.\d+)?($|-)/ && ($CI_PIPELINE_SOURCE == "push")'

.if-protected: &if-protected
  if: '($CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_BRANCH =~ /^release\/v/ || $CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?($|-)/)'

.if-github-push: &if-github-push
  if: '($CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_BRANCH =~ /^release\/v/ || $CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?($|-)/) &&
        $CI_PIPELINE_SOURCE != "schedule"'

.if-label-unit_test: &if-label-unit_test
  if: '$BOT_LABEL_UNIT_TEST || $CI_MERGE_REQUEST_LABELS =~ /^(?:[^,\n\r]+,)*unit_test(?:,[^,\n\r]+)*$/i'

.if-label-example_test: &if-label-example_test
  if: '$BOT_LABEL_EXAMPLE_TEST || $CI_MERGE_REQUEST_LABELS =~ /^(?:[^,\n\r]+,)*example_test(?:,[^,\n\r]+)*$/i'

.if-latest-idf-version: &if-latest-idf-version
  if: '$LATEST_IDF_VERSION_ENV == "1"'

.if-puppet_env: &if-puppet_env
  if: '$PUPPET_ENV == "1"'

# <CHIP>_ENV is a comma-separated test-type list (EXAMPLE_TEST / COMPONENT_TEST).
# A non-empty value means this chip enables at least one test type.
.if-esp32-env: &if-esp32-env
  if: '$ESP32_ENV != ""'

.if-esp32s2-env: &if-esp32s2-env
  if: '$ESP32S2_ENV != ""'

.if-esp32s3-env: &if-esp32s3-env
  if: '$ESP32S3_ENV != ""'

.if-esp32c3-env: &if-esp32c3-env
  if: '$ESP32C3_ENV != ""'

.if-esp32c6-env: &if-esp32c6-env
  if: '$ESP32C6_ENV != ""'

.if-esp32p4-env: &if-esp32p4-env
  if: '$ESP32P4_ENV != ""'

.if-label-example: &if-label-example
  if: '$BOT_LABEL_EXAMPLE_TEST || $CI_MERGE_REQUEST_LABELS =~ /^(?:[^,\n\r]+,)*example(?:,[^,\n\r]+)*$/i'

.if-idf-version-tag-v5-0: &if-idf-version-tag-v5-0
  if: '($IDF_VERSION_TAG == "v5.0.4" || $IDF_VERSION_TAG == "v5.0")'
  variables:
    IMAGE: "$ADF_DOCKER_REGISTRY/env_v5.0:4"

.rules:build:enable-example-test:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - if: '$ESP32S2_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - if: '$ESP32S3_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - if: '$ESP32C3_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - if: '$ESP32C6_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - if: '$ESP32P4_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'
    - <<: *if-label-example_test

.rules:build:enable-unit-test:
  rules:
    - <<: *if-dev-push
      when: never
    - if: '$ESP32_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'
    - if: '$ESP32S2_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'
    - if: '$ESP32S3_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'
    - if: '$ESP32C3_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'
    - if: '$ESP32C6_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'
    - if: '$ESP32P4_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'

.rules:build:enable-unit-test-esp32:
  rules:
    - <<: *if-dev-push
      when: never
    - if: '$ESP32_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'

.rules:build:enable-unit-test-esp32s3:
  rules:
    - <<: *if-dev-push
      when: never
    - if: '$ESP32S3_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'

.rules:build:enable-unit-test-esp32p4:
  rules:
    - <<: *if-dev-push
      when: never
    - if: '$ESP32P4_ENV =~ /(^|,)COMPONENT_TEST(,|$)/'

.rules:build:adf-idfs-example-test:
  rules:
    - <<: *if-protected
    - <<: *if-merge_request_event
    - <<: *if-open-merge-request
      when: never

.rules:ref:master-schedule:
  rules:
    - <<: *if-ref-master
    - <<: *if-schedule

.rules:ref:check-label:
  rules:
    - <<: *if-protected
      when: never
    - <<: *if-merge_request_event
    - <<: *if-open-merge-request
      when: never

.rules:build:trigger-pipeline:
  rules:
    - <<: *if-dev-push
      when: never
    - <<: *if-schedule
      when: never
    - changes: *patterns-example_test
    - changes: *patterns-build_components
    - <<: *if-protected
    - <<: *if-trigger
    - <<: *if-pipeline
    - <<: *if-child-pipeline

.rules:build:example_test_audio_loopback:
  rules:
    - <<: *if-dev-push
      when: never
    - if: '$ESP32_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32s2:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32S2_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32s3:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32S3_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32c3:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32C3_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32c6:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32C6_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:build:enable-example-test-esp32p4:
  rules:
    - <<: *if-open-merge-request
      when: never
    - if: '$ESP32P4_ENV =~ /(^|,)EXAMPLE_TEST(,|$)/'

.rules:puppet_env:
  rules:
    - <<: *if-open-merge-request
      when: never
    - <<: *if-puppet_env
    - <<: *if-esp32-env
    - <<: *if-esp32s2-env
    - <<: *if-esp32s3-env
    - <<: *if-esp32c3-env
    - <<: *if-esp32c6-env
    - <<: *if-esp32p4-env

.rules:build:push-to-github:
  rules:
    - <<: *if-github-push
