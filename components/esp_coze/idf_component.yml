version: "1.0.0"
description: Espressif Coze is a lightweight SDK based on WebSocket
url: https://github.com/espressif/esp-adf/tree/master/components/esp_coze
issues: https://github.com/espressif/esp-adf/issues

dependencies:
  espressif/esp_websocket_client: ">=1.7.0"
  espressif/cjson:
    version: "^1.7.19"
    rules:
      - if: "idf_version >=6.0"

targets:
  - esp32
  - esp32s3
  - esp32s2
  - esp32p4
  - esp32c3
  - esp32c6
  - esp32c5
  - esp32s31

examples:
  - path: ../../adf_examples/ai_agent/coze_ws_app
